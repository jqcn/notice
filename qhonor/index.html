<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>长汀丘(邱)氏-兴教育贤 · 荣誉证书生成</title>
    <style>
        /* 与 certificate_generator.html 保持一致的自定义字体，批量生成证书画布时使用 */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('fonts/FZ_GDC_Bold.TTF') format('truetype');
            font-weight: bold;
        }
        /* ===== 样式与之前一致 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: #f6f3ef;
            color: #2c2c2c;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 32px 36px 48px;
            transition: all 0.2s;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 2px solid #f0ebe6;
            padding-bottom: 20px;
            margin-bottom: 28px;
        }
        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1e1e1e;
        }
        .header-left h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #8a7a6a;
            margin-left: 12px;
        }
        .header-left .sub {
            font-size: 14px;
            color: #9a8a7a;
            margin-top: 4px;
        }
        .stats-badge {
            background: #f0ebe6;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #4a3f37;
            white-space: nowrap;
        }
        .stats-badge strong {
            font-weight: 600;
            color: #1e1e1e;
        }
        .search-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: #faf8f6;
            padding: 16px 20px;
            border-radius: 20px;
            border: 1px solid #ece6e0;
        }
        .search-input-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-input-wrap input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            font-size: 16px;
            border: 1px solid #dcd4cc;
            border-radius: 14px;
            background: #ffffff;
            outline: none;
            transition: 0.25s;
            color: #1e1e1e;
        }
        .search-input-wrap input:focus {
            border-color: #b8a088;
            box-shadow: 0 0 0 3px rgba(184, 160, 136, 0.2);
        }
        .search-input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #b0a090;
            pointer-events: none;
        }
        .search-options {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-options label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #4a3f37;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            background: #f0ebe6;
            transition: 0.2s;
            user-select: none;
        }
        .search-options label:hover {
            background: #e5ddd6;
        }
        .search-options input[type="radio"] {
            accent-color: #8a7a6a;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .btn {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            background: #dcd4cc;
            color: #3a3028;
        }
        .btn-primary {
            background: #2c2c2c;
            color: #fff;
        }
        .btn-primary:hover {
            background: #1e1e1e;
            transform: scale(1.01);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.10);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #dcd4cc;
        }
        .btn-outline:hover {
            background: #f0ebe6;
        }
        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            padding: 0 4px;
        }
        .result-meta .count {
            font-size: 15px;
            color: #5a4f47;
        }
        .result-meta .count strong {
            color: #1e1e1e;
            font-weight: 600;
        }
        .result-meta .total-amount {
            font-size: 15px;
            background: #f0ebe6;
            padding: 4px 16px;
            border-radius: 30px;
            color: #3a3028;
        }
        .result-meta .total-amount strong {
            font-weight: 600;
            color: #1e1e1e;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #ece6e0;
            background: #fcfaf8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        thead {
            background: #f0ebe6;
        }
        thead th {
            text-align: left;
            padding: 14px 18px;
            font-weight: 600;
            color: #3a3028;
            letter-spacing: 0.3px;
            font-size: 14px;
            border-bottom: 1px solid #e0d8d0;
        }
        thead th:last-child {
            text-align: right;
        }
        tbody tr {
            border-bottom: 1px solid #ece6e0;
            transition: 0.15s;
        }
        tbody tr:last-child {
            border-bottom: none;
        }
        tbody tr:hover {
            background: #f6f1ec;
        }
        tbody td {
            padding: 13px 18px;
            color: #2c2c2c;
            vertical-align: middle;
        }
        tbody td:last-child {
            text-align: right;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        /* 链接样式 - 保留文字颜色，鼠标悬停加下划线 */
        .name-link {
            color: inherit;
            text-decoration: none;
            cursor: pointer;
        }
        .name-link:hover {
            text-decoration: underline;
            color: #1e1e1e;
        }
        .highlight {
            background: #fff1d6;
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 500;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #9a8a7a;
        }
        .empty-state .emoji {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 16px;
        }
        .loading-tip {
            text-align: center;
            padding: 48px 20px;
            color: #6a5f57;
            font-size: 16px;
        }
        .loading-tip .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 4px solid #e0d8d0;
            border-top-color: #2c2c2c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            background: #fce8e6;
            color: #b33a34;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border-left: 6px solid #b33a34;
            font-weight: 500;
        }
        .reload-btn {
            background: none;
            border: 1px solid #dcd4cc;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .reload-btn:hover {
            background: #f0ebe6;
        }
        @media (max-width: 700px) {
            .app { padding: 20px 16px 30px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-left h1 { font-size: 22px; }
            .header-left h1 small { display: block; margin-left: 0; margin-top: 2px; }
            .search-section { flex-direction: column; padding: 14px 16px; }
            .search-input-wrap input { padding: 11px 14px 11px 40px; font-size: 15px; }
            .search-options { justify-content: flex-start; }
            .btn { padding: 10px 20px; font-size: 14px; width: 100%; justify-content: center; }
            .result-meta { flex-direction: column; align-items: flex-start; }
            thead th, tbody td { padding: 10px 12px; font-size: 14px; }
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .app { padding: 16px 12px 24px; border-radius: 20px; }
            .stats-badge { font-size: 12px; padding: 4px 14px; }
        }
        .table-wrap::-webkit-scrollbar { height: 6px; }
        .table-wrap::-webkit-scrollbar-track { background: #f0ebe6; border-radius: 10px; }
        .table-wrap::-webkit-scrollbar-thumb { background: #ccc2b8; border-radius: 10px; }

        /* ===== 批量生成证书相关样式 ===== */
        .checkbox-col {
            width: 44px;
            text-align: center !important;
        }
        .checkbox-col input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #2c2c2c;
            cursor: pointer;
        }
        .batch-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .batch-selected-count {
            font-size: 14px;
            color: #6a5f57;
        }
        .btn-batch {
            background: #3a6b52;
            color: #fff;
            white-space: nowrap;
        }
        .btn-batch:hover {
            background: #2c5540;
        }
        .btn-batch:disabled {
            background: #cfcac2;
            cursor: not-allowed;
        }
        .batch-progress-wrap {
            display: none;
            margin-bottom: 18px;
            padding: 16px 20px;
            border-radius: 16px;
            background: #f0f6f2;
            border: 1px solid #d6e6dc;
        }
        .batch-progress-wrap.active {
            display: block;
        }
        .batch-progress-text {
            font-size: 14px;
            color: #2c4a3a;
            margin-bottom: 8px;
        }
        .batch-progress-bar-track {
            width: 100%;
            height: 8px;
            background: #dcecE2;
            border-radius: 10px;
            overflow: hidden;
        }
        .batch-progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3a6b52;
            transition: width 0.15s ease;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div class="app" id="app">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <h1>
                    📜 2026长汀丘(邱)氏-兴教育贤-捐赠名单
                    <small>数据持续同步中,如数据有误,请及时和筹备小组联系</small>
                </h1>
                <div class="sub" id="statusInfo">
                    ⏳ 正在加载数据 …
                </div>
            </div>
            <div class="stats-badge">
                💰 总额 <strong id="totalAmountAll">0</strong> 元
            </div>
            <div class="stats-badge">
                <a href=http://2026.qfamily.cn>查询历年捐赠汇总</a>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-section">
            <div class="search-input-wrap">
                <span class="icon">🔍</span>
                <input
                type="text"
                id="searchInput"
                placeholder="输入姓名检索 … 支持「丘 / 邱」通配"
                disabled
                />
            </div>
            <div class="search-options">
                <label>
                    <input type="radio" name="mode" value="exact" />
                    精确
                </label>
                <label>
                    <input type="radio" name="mode" value="fuzzy" checked />
                    模糊
                </label>
                <label>
                    <input type="radio" name="mode" value="qiu" />
                    🔄 丘⇄邱
                </label>
                <button class="btn btn-primary" id="searchBtn" disabled>检索</button>
                <button class="btn btn-outline" id="resetBtn" disabled>重置</button>
                <button class="reload-btn" id="reloadBtn" title="重新加载 JSON 文件">⟳ 刷新数据</button>
            </div>
        </div>

        <!-- 批量生成证书工具条 -->
        <div class="search-section batch-bar">
            <span class="batch-selected-count" id="batchSelectedCount">暂无可勾选的记录</span>
            <button class="btn btn-batch" id="batchDownloadBtn" disabled>📦 批量生成并下载证书（ZIP）</button>
        </div>

        <!-- 批量生成进度 -->
        <div class="batch-progress-wrap" id="batchProgressWrap">
            <div class="batch-progress-text" id="batchProgressText">正在生成 0 / 0 …</div>
            <div class="batch-progress-bar-track">
                <div class="batch-progress-bar-fill" id="batchProgressFill"></div>
            </div>
        </div>

        <!-- 错误信息 -->
        <div id="errorContainer"></div>

        <!-- 结果元信息 -->
        <div class="result-meta" id="resultMeta">
            <span class="count">找到 <strong id="resultCount">0</strong> 条捐赠记录</span>
            <span class="total-amount">合计 <strong id="resultTotal">0</strong> 元</span>
        </div>

        <!-- 表格 -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-col"><input type="checkbox" id="selectAllCheckbox" title="全选/取消全选（当前筛选结果）" /></th>
                        <th style="width:56%;">姓名（点击生成证书）</th>
                        <th style="width:40%;text-align:right;">金额 (元)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="3">
                            <div class="loading-tip">
                                <div class="spinner"></div>
                                <p>正在读取 <code>user_info.json</code> …</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 全局状态
        // ============================================================
        let allData = [];
        let isDataLoaded = false;

        // 批量生成证书相关状态
        let currentRenderedList = [];   // 当前筛选/排序后正在表格中显示的数据
        let selectedIndices = new Set(); // 用户勾选的 currentRenderedList 下标
        let certBgImageCache = null;    // 证书背景图缓存（images/q_cert.jpg）
        let isBatchGenerating = false;

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const tableBody = document.getElementById('tableBody');
        const resultCount = document.getElementById('resultCount');
        const resultTotal = document.getElementById('resultTotal');
        const totalAmountAll = document.getElementById('totalAmountAll');
        const statusInfo = document.getElementById('statusInfo');
        const errorContainer = document.getElementById('errorContainer');

        // ============================================================
        //  2. 工具函数（检索与高亮）
        // ============================================================
        function swapQiu(str) {
            return str.replace(/[丘邱]/g, (m) => (m === '丘' ? '邱' : '丘'));
        }

        function isMatch(name, keyword, mode) {
            if (!keyword) return true;
            const kw = keyword.trim();
            if (!kw) return true;
            const n = name;
            switch (mode) {
                case 'exact': return n === kw;
                case 'fuzzy': return n.includes(kw);
                case 'qiu':
                    return n.includes(kw) || n.includes(swapQiu(kw)) ||
                        swapQiu(n).includes(kw) || swapQiu(n).includes(swapQiu(kw));
                default: return n.includes(kw);
            }
        }

        function highlightName(name, keyword, mode) {
            if (!keyword || (mode !== 'fuzzy' && mode !== 'qiu')) return name;
            const kw = keyword.trim();
            if (!kw) return name;
            let result = name;
            const candidates = mode === 'qiu' ? [kw, swapQiu(kw)] : [kw];
            for (const c of candidates) {
                if (c && result.includes(c)) {
                    result = result.replaceAll(c, `<span class="highlight">${c}</span>`);
                }
            }
            return result;
        }

        // ============================================================
        //  3. 渲染函数（核心修改：姓名变为链接）
        // ============================================================
        function render(keyword, mode) {
            if (!isDataLoaded || allData.length === 0) {
                tableBody.innerHTML = `
                        <tr>
                            <td colspan="3">
                                <div class="empty-state">
                                    <div class="emoji">📭</div>
                                    <p>暂无数据，请确保 <code>user_info.json</code> 已正确加载</p>
                                </div>
                            </td>
                        </tr>
                    `;
                resultCount.textContent = '0';
                resultTotal.textContent = '0';
                return;
            }

            const kw = (keyword || '').trim();
            let filtered = allData;
            if (kw) {
                filtered = allData.filter(item => isMatch(item.姓名, kw, mode));
            }
            const sorted = [...filtered].sort((a, b) => b.金额 - a.金额);
            const count = sorted.length;
            const total = sorted.reduce((sum, d) => sum + d.金额, 0);
            resultCount.textContent = count;
            resultTotal.textContent = total.toLocaleString();

            // 记录当前渲染出来的列表，供批量生成证书使用
            currentRenderedList = sorted;
            selectedIndices.clear();
            updateBatchUI();

            if (count === 0) {
                tableBody.innerHTML = `
                        <tr>
                            <td colspan="3">
                                <div class="empty-state">
                                    <div class="emoji">🔎</div>
                                    <p>未找到匹配记录，试试调整关键词或检索模式</p>
                                </div>
                            </td>
                        </tr>
                    `;
                return;
            }

            let html = '';
            sorted.forEach((item, idx) => {
                // 构建链接：将姓名作为链接，金额数字直接传递
                const nameRaw = item.姓名;
                const amountRaw = item.金额; // 数字
                const linkUrl = `certificate_generator.html?name=${encodeURIComponent(nameRaw)}&amount=${amountRaw}`;

                // 高亮处理（仅显示用）
                const displayName = (mode === 'fuzzy' || mode === 'qiu') ?
                    highlightName(nameRaw, kw, mode) :
                    nameRaw;

                // 将高亮后的 HTML 放入链接内部
                html += `
                        <tr>
                            <td class="checkbox-col">
                                <input type="checkbox" class="row-checkbox" data-idx="${idx}" />
                            </td>
                            <td>
                                <a class="name-link" href="${linkUrl}" target="_blank" title="点击生成 ${nameRaw} 的荣誉证书">
                                    ${displayName}
                                </a>
                            </td>
                            <td>${item.金额.toLocaleString()}</td>
                        </tr>
                    `;
            });
            tableBody.innerHTML = html;
            bindRowCheckboxes();
        }

        // ============================================================
        //  4. 加载数据 (fetch)
        // ============================================================
        function loadData() {
            statusInfo.innerHTML = '⏳ 正在加载数据 …';
            errorContainer.innerHTML = '';
            tableBody.innerHTML = `
                    <tr>
                        <td colspan="3">
                            <div class="loading-tip">
                                <div class="spinner"></div>
                                <p>正在读取 <code>user_info.json</code> …</p>
                            </div>
                        </td>
                    </tr>
                `;
            searchInput.disabled = true;
            searchBtn.disabled = true;
            resetBtn.disabled = true;

            fetch('user_info.json')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                    return response.json();
                })
                .then(json => {
                    if (!json.data || !Array.isArray(json.data)) {
                        throw new Error('JSON 格式错误：缺少 "data" 数组');
                    }
                    allData = json.data;
                    isDataLoaded = true;
                    const total = allData.reduce((sum, d) => sum + (d.金额 || 0), 0);
                    totalAmountAll.textContent = total.toLocaleString();
                    statusInfo.innerHTML = `✅ 已加载 <strong>${allData.length}</strong> 条记录 · 总额 ${total.toLocaleString()} 元`;

                    searchInput.disabled = false;
                    searchBtn.disabled = false;
                    resetBtn.disabled = false;

                    const keyword = searchInput.value;
                    const modeEl = document.querySelector('input[name="mode"]:checked');
                    const mode = modeEl ? modeEl.value : 'fuzzy';
                    render(keyword, mode);
                })
                .catch(err => {
                    console.error('加载数据失败:', err);
                    isDataLoaded = false;
                    allData = [];
                    statusInfo.innerHTML = '⚠️ 数据加载失败';
                    totalAmountAll.textContent = '0';
                    errorContainer.innerHTML = `
                            <div class="error-message">
                                ❌ 无法加载 <code>user_info.json</code>：${err.message}
                                <br><small>请确认文件位于同目录下，且格式为 { "data": [ { "姓名": ..., "金额": ... } ] }</small>
                            </div>
                        `;
                    tableBody.innerHTML = `
                            <tr>
                                <td colspan="3">
                                    <div class="empty-state">
                                        <div class="emoji">🚫</div>
                                        <p>数据加载失败，请检查网络或文件路径</p>
                                        <button class="btn btn-primary" style="margin-top:12px;" onclick="loadData()">🔄 重试</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    searchInput.disabled = true;
                    searchBtn.disabled = true;
                    resetBtn.disabled = true;
                    resultCount.textContent = '0';
                    resultTotal.textContent = '0';
                });
        }

        // ============================================================
        //  5. 事件绑定
        // ============================================================
        function doSearch() {
            if (!isDataLoaded) return;
            const keyword = searchInput.value;
            const modeEl = document.querySelector('input[name="mode"]:checked');
            const mode = modeEl ? modeEl.value : 'fuzzy';
            render(keyword, mode);
        }

        function resetSearch() {
            if (!isDataLoaded) return;
            searchInput.value = '';
            document.querySelector('input[name="mode"][value="fuzzy"]').checked = true;
            render('', 'fuzzy');
            searchInput.focus();
        }

        searchBtn.addEventListener('click', doSearch);
        resetBtn.addEventListener('click', resetSearch);
        reloadBtn.addEventListener('click', loadData);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
        });
        document.querySelectorAll('input[name="mode"]').forEach(el => {
            el.addEventListener('change', doSearch);
        });
        let debounceTimer = null;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => { doSearch(); }, 200);
        });

        // ============================================================
        //  6. 批量生成并打包下载证书（ZIP）
        // ============================================================

        // ---- 6.1 勾选框联动 ----
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');
        const batchDownloadBtn = document.getElementById('batchDownloadBtn');
        const batchSelectedCount = document.getElementById('batchSelectedCount');
        const batchProgressWrap = document.getElementById('batchProgressWrap');
        const batchProgressText = document.getElementById('batchProgressText');
        const batchProgressFill = document.getElementById('batchProgressFill');

        function bindRowCheckboxes() {
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = selectedIndices.has(Number(cb.dataset.idx));
                cb.addEventListener('change', () => {
                    const idx = Number(cb.dataset.idx);
                    if (cb.checked) selectedIndices.add(idx);
                    else selectedIndices.delete(idx);
                    updateBatchUI();
                });
            });
        }

        function updateBatchUI() {
            const total = currentRenderedList.length;
            const selectedCount = selectedIndices.size;

            if (selectAllCheckbox) {
                selectAllCheckbox.checked = total > 0 && selectedCount === total;
                selectAllCheckbox.indeterminate = selectedCount > 0 && selectedCount < total;
                selectAllCheckbox.disabled = total === 0 || isBatchGenerating;
            }

            if (selectedCount > 0) {
                batchSelectedCount.textContent = `已选中 ${selectedCount} 人`;
            } else {
                batchSelectedCount.textContent = total > 0 ? '请先勾选需要生成证书的人员' : '暂无可勾选的记录';
            }

            batchDownloadBtn.disabled = selectedCount === 0 || isBatchGenerating;
        }

        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', () => {
                if (selectAllCheckbox.checked) {
                    currentRenderedList.forEach((_, idx) => selectedIndices.add(idx));
                } else {
                    selectedIndices.clear();
                }
                bindRowCheckboxes();
                updateBatchUI();
            });
        }

        // ---- 6.2 证书绘制逻辑（与 certificate_generator.html 保持完全一致） ----
        const CERT_FONT_FAMILY = '"MyCustomFont", "Microsoft YaHei", "PingFang SC", "Heiti SC", "SimHei", "Noto Sans CJK SC", "Noto Sans SC", sans-serif';
        const CERT_BG_SRC = 'images/q_cert.jpg';
        const CERT_WIDTH = 1242;
        const CERT_HEIGHT = 2208;

        function numberToChineseAmountBatch(input) {
            const trimmed = String(input ?? '').trim();
            if (!/^\d+$/.test(trimmed)) {
                return trimmed;
            }
            const num = parseInt(trimmed, 10);
            if (num === 0) return '零元';

            const digits = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
            const units = ['', '拾', '佰', '仟'];
            const bigUnits = ['', '万', '亿'];

            const numStr = String(num);
            const len = numStr.length;
            let result = '';
            let zeroFlag = false;

            for (let i = 0; i < len; i++) {
                const digit = parseInt(numStr[i], 10);
                const posFromRight = len - i - 1;
                const unitIndex = posFromRight % 4;
                const bigUnitIndex = Math.floor(posFromRight / 4);

                if (digit === 0) {
                    zeroFlag = true;
                } else {
                    if (zeroFlag) {
                        result += digits[0];
                        zeroFlag = false;
                    }
                    result += digits[digit] + units[unitIndex];
                }
                if (unitIndex === 0 && bigUnitIndex > 0) {
                    result += bigUnits[bigUnitIndex];
                }
            }

            result = result.replace(/零+/g, '零').replace(/零$/, '');
            return result + '元';
        }

        function loadCertBgImage() {
            if (certBgImageCache) return Promise.resolve(certBgImageCache);
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    certBgImageCache = img;
                    resolve(img);
                };
                img.onerror = () => reject(new Error(`背景图加载失败：${CERT_BG_SRC}`));
                img.src = CERT_BG_SRC;
            });
        }

        async function preloadCertFonts() {
            try {
                await Promise.all([
                    document.fonts.load(`bold 68px ${CERT_FONT_FAMILY}`),
                    document.fonts.load(`bold 50px ${CERT_FONT_FAMILY}`),
                    document.fonts.load(`120px ${CERT_FONT_FAMILY}`)
                ]);
            } catch (e) {
                console.warn('批量生成：字体预加载出现问题：', e);
            }
        }

        // 绘制单张证书，返回 PNG Blob（离屏 canvas，逻辑与 certificate_generator.html 的 generateImage 一致）
        function drawCertificateToBlob(name, amount, bgImage) {
            return new Promise((resolve, reject) => {
                const canvas = document.createElement('canvas');
                canvas.width = CERT_WIDTH;
                canvas.height = CERT_HEIGHT;
                const ctx = canvas.getContext('2d');

                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

                const textName = String(name ?? '');
                const textAmount = numberToChineseAmountBatch(amount);

                ctx.fillStyle = "#1a1a1a";
                ctx.textAlign = "left";

                ctx.font = `bold 68px ${CERT_FONT_FAMILY}`;
                ctx.fillText(textName, 175, 825);
                const nameWidth = ctx.measureText(textName).width;

                ctx.font = `bold 50px ${CERT_FONT_FAMILY}`;
                if (textName.startsWith("丘") || textName.startsWith("邱")) {
                    ctx.fillText(" 宗贤：", 175 + nameWidth, 825);
                } else {
                    ctx.fillText("：", 175 + nameWidth, 825);
                }

                ctx.font = `120px ${CERT_FONT_FAMILY}`;
                ctx.fillStyle = "#1a1a1a";
                ctx.strokeStyle = "#1a1a1a";
                ctx.lineWidth = 3;
                ctx.textAlign = "center";
                ctx.strokeText(textAmount, canvas.width / 2, 1230);
                ctx.fillText(textAmount, canvas.width / 2, 1230);

                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error('生成图片失败（toBlob 返回空）'));
                }, 'image/jpeg', 0.92);
            });
        }

        // ---- 6.3 批量下载入口 ----
        async function runBatchDownload() {
            if (isBatchGenerating) return;
            if (typeof JSZip === 'undefined') {
                alert('打包组件（JSZip）加载失败，请检查网络后重试。');
                return;
            }

            const targets = [...selectedIndices].sort((a, b) => a - b).map(idx => currentRenderedList[idx]);

            if (!targets || targets.length === 0) {
                alert('请先勾选需要生成证书的人员，再点击批量生成。');
                return;
            }

            const confirmed = confirm(`即将生成 ${targets.length} 份证书并打包为 ZIP，可能需要一些时间，是否继续？`);
            if (!confirmed) return;

            isBatchGenerating = true;
            updateBatchUI();
            batchProgressWrap.classList.add('active');
            batchProgressFill.style.width = '0%';
            batchProgressText.textContent = `正在准备（加载背景图与字体）…`;

            try {
                const bgImage = await loadCertBgImage();
                await preloadCertFonts();

                const zip = new JSZip();
                const usedNames = new Map(); // 处理重名，避免文件互相覆盖

                for (let i = 0; i < targets.length; i++) {
                    const item = targets[i];
                    const name = item.姓名;
                    const amount = item.金额;

                    batchProgressText.textContent = `正在生成 ${i + 1} / ${targets.length} ：${name}`;
                    batchProgressFill.style.width = `${Math.round(((i + 1) / targets.length) * 100)}%`;

                    const blob = await drawCertificateToBlob(name, amount, bgImage);

                    let safeName = String(name).replace(/[\\/:*?"<>|]/g, '_');
                    const dupCount = usedNames.get(safeName) || 0;
                    usedNames.set(safeName, dupCount + 1);
                    const fileName = dupCount === 0
                        ? `${safeName}_${amount}.jpg`
                        : `${safeName}_${amount}_${dupCount + 1}.jpg`;

                    zip.file(fileName, blob);

                    // 让出一帧，避免长时间卡死页面
                    await new Promise(r => setTimeout(r, 0));
                }

                batchProgressText.textContent = '正在打包 ZIP …';
                const zipBlob = await zip.generateAsync({ type: 'blob' }, (metadata) => {
                    batchProgressFill.style.width = `${Math.round(metadata.percent)}%`;
                    batchProgressText.textContent = `正在打包 ZIP … ${Math.round(metadata.percent)}%`;
                });

                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                const stamp = new Date().toISOString().slice(0, 10);
                a.href = url;
                a.download = `荣誉证书批量下载_${stamp}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                batchProgressText.textContent = `✅ 完成！共 ${targets.length} 份证书已打包下载。`;
            } catch (err) {
                console.error('批量生成失败：', err);
                batchProgressText.textContent = `❌ 批量生成失败：${err.message}`;
            } finally {
                isBatchGenerating = false;
                updateBatchUI();
            }
        }

        batchDownloadBtn.addEventListener('click', runBatchDownload);

        // ============================================================
        //  7. 启动
        // ============================================================
        window.loadData = loadData;
        loadData();
        console.log('✅ 名录已启动，点击姓名将打开证书生成器');
    </script>

</body>
</html>
